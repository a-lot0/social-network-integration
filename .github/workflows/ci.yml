name: CI - все тесты

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ============================================
  # UNIT-ТЕСТЫ
  # ============================================
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest requests-mock
          pip install -r profile-service/requirements.txt
          pip install -r post-service/requirements.txt
          pip install -r feed-service/requirements.txt
      
      - name: Run unit tests
        run: pytest tests/unit/ -v

  # ============================================
  # ИНТЕГРАЦИОННЫЕ ТЕСТЫ (с PostgreSQL)
  # ============================================
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: mysecretpassword
          POSTGRES_DB: social_network
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      
      - name: Install dependencies
        run: |
          pip install pytest requests
          pip install -r profile-service/requirements.txt
          pip install -r post-service/requirements.txt
          pip install -r feed-service/requirements.txt
      
      - name: Wait for PostgreSQL
        run: |
          for i in {1..15}; do
            if PGPASSWORD=mysecretpassword pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL готов"
              break
            fi
            echo "Ожидание PostgreSQL... попытка $i/15"
            sleep 3
          done
      
      - name: Create database tables
        run: |
          PGPASSWORD=mysecretpassword psql -h localhost -U postgres -d social_network << 'SQL'
          CREATE TABLE IF NOT EXISTS users (
              id SERIAL PRIMARY KEY,
              username VARCHAR(50) NOT NULL UNIQUE,
              email VARCHAR(100) NOT NULL UNIQUE,
              bio VARCHAR(500),
              avatar_url VARCHAR(200),
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS posts (
              id SERIAL PRIMARY KEY,
              user_id INTEGER NOT NULL,
              content VARCHAR(280) NOT NULL,
              image_url VARCHAR(200),
              likes_count INTEGER DEFAULT 0,
              comments_count INTEGER DEFAULT 0,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS subscriptions (
              id SERIAL PRIMARY KEY,
              follower_id INTEGER NOT NULL,
              following_id INTEGER NOT NULL,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          CREATE TABLE IF NOT EXISTS notifications (
              id SERIAL PRIMARY KEY,
              user_id INTEGER NOT NULL,
              post_id INTEGER NOT NULL,
              author_id INTEGER NOT NULL,
              message VARCHAR(500) NOT NULL,
              is_read INTEGER DEFAULT 0,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          SQL
      
      - name: Start Profile Service
        run: |
          cd profile-service
          export DATABASE_URL=postgresql://postgres:mysecretpassword@localhost:5432/social_network
          python app.py &
          sleep 5
      
      - name: Start Post Service
        run: |
          cd post-service
          export DATABASE_URL=postgresql://postgres:mysecretpassword@localhost:5432/social_network
          export PROFILE_SERVICE_URL=http://localhost:5001
          python app.py &
          sleep 5
      
      - name: Start Feed Service
        run: |
          cd feed-service
          export DATABASE_URL=postgresql://postgres:mysecretpassword@localhost:5432/social_network
          export PROFILE_SERVICE_URL=http://localhost:5001
          export POST_SERVICE_URL=http://localhost:5002
          python app.py &
          sleep 10
      
      - name: Check services are ready
        run: |
          echo "Проверка Profile Service..."
          curl -f http://localhost:5001/profiles || exit 1
          echo "✅ Profile Service готов"
          
          echo "Проверка Post Service..."
          curl -f http://localhost:5002/posts/user/1 || exit 1
          echo "✅ Post Service готов"
          
          echo "Проверка Feed Service..."
          curl -f http://localhost:5003/feed/1 || exit 1
          echo "✅ Feed Service готов"
      
      - name: Run integration tests
        run: pytest tests/integration/ -v

  # ============================================
  # E2E ТЕСТЫ
  # ============================================
  e2e-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: mysecretpassword
          POSTGRES_DB: social_network
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      
      - name: Install dependencies
        run: |
          pip install pytest requests
          pip install -r profile-service/requirements.txt
          pip install -r post-service/requirements.txt
          pip install -r feed-service/requirements.txt
      
      - name: Wait for PostgreSQL
        run: |
          for i in {1..15}; do
            if PGPASSWORD=mysecretpassword pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL готов"
              break
            fi
            echo "Ожидание PostgreSQL... попытка $i/15"
            sleep 3
          done
      
      - name: Start all services
        run: |
          export DATABASE_URL=postgresql://postgres:mysecretpassword@localhost:5432/social_network
          cd profile-service && python app.py &
          cd ../post-service && python app.py &
          cd ../feed-service && python app.py &
          sleep 15
      
      - name: Check services
        run: |
          curl -f http://localhost:5001/profiles || exit 1
          curl -f http://localhost:5002/posts/user/1 || exit 1
          curl -f http://localhost:5003/feed/1 || exit 1
      
      - name: Run E2E tests
        run: pytest tests/e2e/ -v