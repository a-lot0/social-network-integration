name: CI - все тесты

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pytest requests-mock
          pip install -r profile-service/requirements.txt
          pip install -r post-service/requirements.txt
          pip install -r feed-service/requirements.txt
      - name: Run unit tests
        run: pytest tests/unit/ -v

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: mysecretpassword
          POSTGRES_DB: social_network
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pytest requests
          pip install -r profile-service/requirements.txt
          pip install -r post-service/requirements.txt
          pip install -r feed-service/requirements.txt
      - name: Start services
        run: |
          cd profile-service && python app.py &
          cd ../post-service && python app.py &
          cd ../feed-service && python app.py &
          sleep 10
      - name: Run integration tests
        run: pytest tests/integration/ -v

  e2e-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: mysecretpassword
          POSTGRES_DB: social_network
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pytest requests
          pip install -r profile-service/requirements.txt
          pip install -r post-service/requirements.txt
          pip install -r feed-service/requirements.txt
      - name: Start services
        run: |
          cd profile-service && python app.py &
          cd ../post-service && python app.py &
          cd ../feed-service && python app.py &
          sleep 15
      - name: Run E2E tests
        run: pytest tests/e2e/ -v