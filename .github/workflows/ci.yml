name: CI для социальной сети (unit-тесты)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: |
          pip install pytest pytest-cov requests-mock
          pip install -r profile-service/requirements.txt
          pip install -r post-service/requirements.txt
          pip install -r feed-service/requirements.txt

      - name: Запуск unit-тестов
        run: pytest tests/unit/ -v --cov=. --cov-report=xml

      - name: Загрузка отчёта о покрытии (опционально)
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml