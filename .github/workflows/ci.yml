name: CI - все тесты

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ============================================
  # UNIT-ТЕСТЫ (не требуют сервисов)
  # ============================================
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest requests-mock
          pip install -r profile-service/requirements.txt
          pip install -r post-service/requirements.txt
          pip install -r feed-service/requirements.txt
      
      - name: Run unit tests
        run: pytest tests/unit/ -v

  # ============================================
  # ИНТЕГРАЦИОННЫЕ ТЕСТЫ (ЗАПУСКАЕМ СЕРВИСЫ)
  # ============================================
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest requests
          pip install -r profile-service/requirements.txt
          pip install -r post-service/requirements.txt
          pip install -r feed-service/requirements.txt
      
      - name: Запуск Profile Service
        run: |
          cd profile-service
          python app.py &
          sleep 3
      
      - name: Запуск Post Service
        run: |
          cd post-service
          python app.py &
          sleep 3
      
      - name: Запуск Feed Service
        run: |
          cd feed-service
          python app.py &
          sleep 5
      
      - name: Проверка готовности сервисов
        run: |
          echo "Проверка Profile Service..."
          curl -f http://localhost:5001/profiles || exit 1
          echo "✅ Profile Service готов"
          
          echo "Проверка Post Service..."
          curl -f http://localhost:5002/posts/user/1 || exit 1
          echo "✅ Post Service готов"
          
          echo "Проверка Feed Service..."
          curl -f http://localhost:5003/feed/1 || exit 1
          echo "✅ Feed Service готов"
      
      - name: Запуск интеграционных тестов
        run: pytest tests/integration/ -v

  # ============================================
  # E2E ТЕСТЫ
  # ============================================
  e2e-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest requests
          pip install -r profile-service/requirements.txt
          pip install -r post-service/requirements.txt
          pip install -r feed-service/requirements.txt
      
      - name: Запуск всех сервисов
        run: |
          cd profile-service && python app.py &
          cd ../post-service && python app.py &
          cd ../feed-service && python app.py &
          sleep 10
      
      - name: Запуск E2E тестов
        run: pytest tests/e2e/ -v