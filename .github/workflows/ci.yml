name: CI/CD для социальной сети (микроблог)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: |
          flake8 profile-service/app.py --max-line-length=120
          flake8 post-service/app.py --max-line-length=120
          flake8 feed-service/app.py --max-line-length=120

  build-docker:
    runs-on: ubuntu-latest
    needs: linting
    steps:
      - uses: actions/checkout@v3
      - name: Build Profile Service
        run: docker build -t profile-service ./profile-service
      - name: Build Post Service
        run: docker build -t post-service ./post-service
      - name: Build Feed Service
        run: docker build -t feed-service ./feed-service

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - uses: actions/checkout@v3
      - name: Start services
        run: docker compose up -d
      - name: Wait for services
        run: sleep 15
      - name: Test Profile Service
        run: curl -f http://localhost:5001/profiles
      - name: Test Post Service
        run: curl -f http://localhost:5002/posts
      - name: Test Feed Service
        run: curl -f http://localhost:5003/feed/1
      - name: Stop services
        run: docker compose down

  check-formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install black
        run: pip install black
      - name: Check formatting
        run: |
          black --check profile-service/app.py
          black --check post-service/app.py
          black --check feed-service/app.py